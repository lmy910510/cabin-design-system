<!-- TopBar · 顶部栏（纯模板，5 个 style variant）
     Figma: 🤖座舱组件库-AI版 / TopBar (COMPONENT_SET 436:1719)
       · style=title          436:1684
       · style=back           436:1688
       · style=title-actions  436:1700
       · style=button-avatar  436:1694
       · style=select-actions 436:1709

     使用前请：
       1) 引入 design-system/tokens.css
       2) 引入 components-html/button/button.css（多个 variant 复用 .btn）
       3) 引入 components-html/top-bar/top-bar.css
       4) 注入图标 sprite：<script src="../icon/icon-sprite-inline.js"></script>
       5) 仅 style=button-avatar 时额外引入：
          - components-html/tab/tab.css       （左侧 Tab 容器布局来源）
          - components-html/tab-item/tab-item.css（左侧 Tab 项视觉来源）
          模板上把 .top-bar__tab-list 与 .tab 复合，子项使用 .tab-item。

     共享骨架：高 156，左右 padding 42，HORIZONTAL SPACE_BETWEEN
     变体切换：在 .top-bar 上加 .top-bar--<variant>
-->

<!-- ============================================================
     1. style=title
     ============================================================ -->
<header class="top-bar top-bar--title">
  <div class="top-bar__left">
    <h1 class="top-bar__title">页面标题</h1>
  </div>
  <div class="top-bar__right"></div>
</header>


<!-- ============================================================
     2. style=back
     ============================================================ -->
<header class="top-bar top-bar--back">
  <div class="top-bar__left">
    <button type="button" class="btn btn--secondary btn--md btn--icon-only" aria-label="返回">
      <span class="btn-icon" aria-hidden="true">
        <svg viewBox="0 0 48 48"><use href="#icon/back--line"/></svg>
      </span>
    </button>
    <span class="top-bar__back-text">返回</span>
  </div>
  <div class="top-bar__right"></div>
</header>


<!-- ============================================================
     3. style=title-actions
     ============================================================ -->
<header class="top-bar top-bar--title-actions">
  <div class="top-bar__left">
    <h1 class="top-bar__title">标题</h1>
  </div>
  <div class="top-bar__right">
    <button type="button" class="btn btn--secondary btn--md"><span class="btn-label">取消</span></button>
    <button type="button" class="btn btn--secondary btn--md"><span class="btn-label">确认</span></button>
  </div>
</header>


<!-- ============================================================
     4. style=button-avatar
     ============================================================ -->
<header class="top-bar top-bar--button-avatar">
  <div class="top-bar__left">
    <ul class="top-bar__tab-list tab" role="tablist">
      <li><button type="button" class="tab-item tab-item--active" role="tab" aria-selected="true">标签</button></li>
      <li><button type="button" class="tab-item" role="tab" aria-selected="false">标签</button></li>
      <li><button type="button" class="tab-item" role="tab" aria-selected="false">标签</button></li>
      <li><button type="button" class="tab-item" role="tab" aria-selected="false">标签</button></li>
    </ul>
  </div>
  <div class="top-bar__right">
    <button type="button" class="btn btn--secondary btn--md"><span class="btn-label">设置</span></button>
    <span class="top-bar__avatar" role="img" aria-label="用户头像"
          style="background-image: url('your-avatar.jpg');"></span>
  </div>
</header>


<!-- ============================================================
     5. style=select-actions
     ============================================================ -->
<header class="top-bar top-bar--select-actions">
  <div class="top-bar__left">
    <label class="top-bar__select">
      <input type="checkbox" class="top-bar__select-checkbox" aria-label="全选" />
      <span class="top-bar__select-label">全选</span>
    </label>
  </div>
  <div class="top-bar__right">
    <button type="button" class="btn btn--danger btn--md" disabled aria-disabled="true">
      <span class="btn-label">删除</span>
    </button>
    <button type="button" class="btn btn--secondary btn--md">
      <span class="btn-label">取消</span>
    </button>
  </div>
</header>
