<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PageIndicator · 预览（Figma 325:13051）</title>
  <link rel="stylesheet" href="../../design-system/tokens.css" />
  <link rel="stylesheet" href="../../design-system/shadows.css" />
  <link rel="stylesheet" href="../page-indicator-item/page-indicator-item.css" />
  <link rel="stylesheet" href="./page-indicator.css" />
  <style>
    body {
      margin: 0;
      padding: 60px 24px 120px;
      background: var(--color-bg-page-secondary);
      color: var(--color-text-primary);
      font-family: var(--font-family-cn, "Noto Sans SC", system-ui, sans-serif);
      min-height: 100vh;
    }
    h1 { margin: 0 0 12px; font-size: 48px; line-height: 54px; font-weight: 700; }
    .subtitle { margin: 0 0 36px; color: var(--color-text-secondary); font-size: 22px; line-height: 30px; }
    h2 { margin: 60px 0 8px; font-size: 32px; line-height: 38px; font-weight: 700; }
    .figma-meta {
      font: 400 16px/22px ui-monospace, "SF Mono", Menlo, monospace;
      color: var(--color-text-tertiary);
      margin: 0 0 18px;
    }
    .strip {
      padding: 36px;
      background: var(--color-bg-card-primary);
      border-radius: 24px;
      box-shadow: var(--shadow-medium);
      display: flex; flex-direction: column; gap: 36px; align-items: flex-start;
    }
    .ruler { outline: 1px dashed var(--color-border-primary); }
  </style>
</head>
<body>
  <h1>PageIndicator · Figma 1:1 预览</h1>
  <p class="subtitle">
    Figma 节点 325:13051（COMPONENT）· HORIZONTAL · 外层 gap 0 · SLOT gap 12 · 默认 4 点（84×12）
  </p>

  <h2>1. 默认 4 点（1 Active + 3 Default）</h2>
  <p class="figma-meta">page-indicator__list · 84×12</p>
  <div class="strip">
    <ul class="page-indicator__list ruler" role="tablist" aria-label="页码 4">
      <li><span class="pi-item" data-state="active" aria-current="true"></span></li>
      <li><span class="pi-item" data-state="default"></span></li>
      <li><span class="pi-item" data-state="default"></span></li>
      <li><span class="pi-item" data-state="default"></span></li>
    </ul>
  </div>

  <h2>2. 任意点数（2 / 5 / 8）</h2>
  <p class="figma-meta">SLOT 增减子项；建议 ≤ 8 点</p>
  <div class="strip">
    <ul class="page-indicator__list" role="tablist">
      <li><span class="pi-item" data-state="active"></span></li>
      <li><span class="pi-item" data-state="default"></span></li>
    </ul>
    <ul class="page-indicator__list" role="tablist">
      <li><span class="pi-item" data-state="default"></span></li>
      <li><span class="pi-item" data-state="default"></span></li>
      <li><span class="pi-item" data-state="active"></span></li>
      <li><span class="pi-item" data-state="default"></span></li>
      <li><span class="pi-item" data-state="default"></span></li>
    </ul>
    <ul class="page-indicator__list" role="tablist">
      <li><span class="pi-item" data-state="default"></span></li>
      <li><span class="pi-item" data-state="default"></span></li>
      <li><span class="pi-item" data-state="default"></span></li>
      <li><span class="pi-item" data-state="default"></span></li>
      <li><span class="pi-item" data-state="default"></span></li>
      <li><span class="pi-item" data-state="default"></span></li>
      <li><span class="pi-item" data-state="active"></span></li>
      <li><span class="pi-item" data-state="default"></span></li>
    </ul>
  </div>
</body>
</html>
