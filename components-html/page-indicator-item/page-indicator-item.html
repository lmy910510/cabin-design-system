<!--
  PageIndicator-item · 最小骨架
  Active：data-state="active"；Default：不写或 data-state="default"
-->

<!-- 单点 · Default -->
<span class="pi-item" data-state="default" aria-hidden="true"></span>

<!-- 单点 · Active -->
<span class="pi-item" data-state="active" aria-hidden="true"></span>


<!--
  容器组合：PageIndicator
  4 页 / 当前第 1 页
-->
<ul class="pi-list" role="tablist" aria-label="页码">
  <li><span class="pi-item" data-state="active" aria-current="true"></span></li>
  <li><span class="pi-item" data-state="default"></span></li>
  <li><span class="pi-item" data-state="default"></span></li>
  <li><span class="pi-item" data-state="default"></span></li>
</ul>
