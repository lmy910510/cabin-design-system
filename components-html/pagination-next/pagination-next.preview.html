<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="utf-8" />
  <title>Pagination-next · 预览（Figma 458:41275）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../../design-system/tokens.css" />
  <link rel="stylesheet" href="../../design-system/shadows.css" />
  <link rel="stylesheet" href="../icon/icon.css" />
  <link rel="stylesheet" href="./pagination-next.css" />
  <style>
    body {
      margin: 0; padding: 60px 24px 120px;
      background: var(--color-bg-page-secondary);
      color: var(--color-text-primary);
      font-family: var(--font-family-cn, "Noto Sans SC", system-ui, sans-serif);
      min-height: 100vh;
    }
    h1 { margin: 0 0 12px; font-size: 48px; line-height: 54px; font-weight: 700; }
    .subtitle { margin: 0 0 36px; color: var(--color-text-secondary); font-size: 22px; line-height: 30px; }
    h2 { margin: 60px 0 8px; font-size: 32px; line-height: 38px; font-weight: 700; }
    .figma-meta {
      font: 400 16px/22px ui-monospace, "SF Mono", Menlo, monospace;
      color: var(--color-text-tertiary);
      margin: 0 0 18px;
    }
    .strip {
      display: flex; gap: 36px; padding: 36px;
      background: var(--color-bg-card-primary);
      border-radius: 24px;
      box-shadow: var(--shadow-medium);
      align-items: center;
    }
    .ruler { outline: 1px dashed var(--color-border-primary); }
  </style>
</head>
<body>
  <h1>Pagination-next · Figma 1:1 预览</h1>
  <p class="subtitle">Figma 458:41275（COMPONENT_SET）· 72×72 · icon/enter 36×36</p>

  <h2>Disabled = False</h2>
  <div class="strip">
    <button type="button" class="pagination-next ruler" aria-label="下一页">
      <span class="pagination-next__icon" aria-hidden="true">
        <svg><use href="../icon/icon.svg#icon/enter--fill"/></svg>
      </span>
    </button>
  </div>

  <h2>Disabled = True</h2>
  <div class="strip">
    <button type="button" class="pagination-next ruler" aria-label="下一页" disabled>
      <span class="pagination-next__icon" aria-hidden="true">
        <svg><use href="../icon/icon.svg#icon/enter--fill"/></svg>
      </span>
    </button>
  </div>
</body>
</html>
