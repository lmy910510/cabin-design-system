<!-- AppFrame · 应用框架（纯模板，不含预览页脚手架）
     Figma: 🤖座舱组件库-AI版 / AppFrame (436:1772)

     已实现：
       SideMenu · expanded(436:1725) · collapsed(436:1750)

     依赖（外部组件）：
       TopBar — 见 components-html/top-bar/（已抽成独立组件）
                  · style=title / back / title-actions / button-avatar / select-actions
                  · 在 .app-frame__topbar-slot 内放置 <header class="top-bar top-bar--*">

     使用前请：
       1) 引入 design-system/tokens.css、shadows.css、text-styles.css
       2) 引入 components-html/button/button.css （TopBar 多 variant 复用 .btn）
       3) 引入 components-html/top-bar/top-bar.css （TopBar 5 个 variant 真源）
       4) 引入 components-html/app-frame/app-frame.css
       5) 注入图标 sprite：<script src="../icon/icon-sprite-inline.js"></script>
       6) 业务页内容写在 .app-frame__content-canvas 里
-->

<!-- ============================================================
     模板 A · SideMenu(expanded) + TopBar(title)
     —— TopBar 默认示意为 .top-bar--title；切换其他 4 个 style 见 top-bar.html
     ============================================================ -->
<div class="app-frame">

  <aside class="side-menu" aria-label="主导航">
    <div class="side-menu__nav-group">
      <ul class="side-menu__nav-list">
        <li>
          <a class="nav-item is-active" href="#" aria-current="page">
            <span class="nav-item__icon" aria-hidden="true">
              <svg viewBox="0 0 48 48"><use href="#icon/list--fill"/></svg>
            </span>
            <span class="nav-item__label">列表</span>
          </a>
        </li>
        <li>
          <a class="nav-item" href="#">
            <span class="nav-item__icon" aria-hidden="true">
              <svg viewBox="0 0 48 48"><use href="#icon/star--line"/></svg>
            </span>
            <span class="nav-item__label">收藏</span>
          </a>
        </li>
        <li>
          <a class="nav-item" href="#">
            <span class="nav-item__icon" aria-hidden="true">
              <svg viewBox="0 0 48 48"><use href="#icon/refresh--line"/></svg>
            </span>
            <span class="nav-item__label">刷新</span>
          </a>
        </li>
        <li>
          <a class="nav-item" href="#">
            <span class="nav-item__icon" aria-hidden="true">
              <svg viewBox="0 0 48 48"><use href="#icon/setting--line"/></svg>
            </span>
            <span class="nav-item__label">设置</span>
          </a>
        </li>
      </ul>
    </div>

    <div class="side-menu__footer">
      <a class="nav-item" href="#">
        <span class="nav-item__icon" aria-hidden="true">
          <svg viewBox="0 0 48 48"><use href="#icon/setting--line"/></svg>
        </span>
        <span class="nav-item__label">设置</span>
      </a>
    </div>
  </aside>

  <div class="app-frame__main">
    <div class="app-frame__card">

      <!-- TopBar slot：放置 top-bar 组件实例（这里以 style=title 示例） -->
      <div class="app-frame__topbar-slot">
        <header class="top-bar top-bar--title">
          <div class="top-bar__left">
            <h1 class="top-bar__title">页面标题</h1>
          </div>
          <div class="top-bar__right"></div>
        </header>
      </div>

      <div class="app-frame__content">
        <div class="app-frame__content-canvas" data-slot="content">
          <!-- 自由绘制区域：1504 × 876 -->
        </div>
      </div>

    </div>
  </div>
</div>


<!-- ============================================================
     模板 B · SideMenu(collapsed) ─ 156×1080，nav-item 切 icon-only 84×84
     —— 仅展示 SideMenu collapsed 形态。TopBar slot 与上同
     ============================================================ -->
<aside class="side-menu side-menu--collapsed" aria-label="主导航">
  <div class="side-menu__nav-group">
    <ul class="side-menu__nav-list">
      <li>
        <a class="nav-item nav-item--icon-only is-active" href="#" aria-current="page" aria-label="列表">
          <span class="nav-item__icon" aria-hidden="true">
            <svg viewBox="0 0 48 48"><use href="#icon/list--fill"/></svg>
          </span>
        </a>
      </li>
      <li>
        <a class="nav-item nav-item--icon-only" href="#" aria-label="收藏">
          <span class="nav-item__icon" aria-hidden="true">
            <svg viewBox="0 0 48 48"><use href="#icon/star--line"/></svg>
          </span>
        </a>
      </li>
    </ul>
  </div>
  <div class="side-menu__footer">
    <a class="nav-item nav-item--icon-only" href="#" aria-label="设置">
      <span class="nav-item__icon" aria-hidden="true">
        <svg viewBox="0 0 48 48"><use href="#icon/setting--line"/></svg>
      </span>
    </a>
  </div>
</aside>
